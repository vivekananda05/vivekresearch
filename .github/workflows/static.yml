name: Deploy static content to Pages

on:
push:
branches: ["main"]
workflow_dispatch:

permissions:
contents: read
pages: write
id-token: write

concurrency:
group: "pages"
cancel-in-progress: false

jobs:
deploy:
environment:
name: github-pages
url: ${{ steps.deployment.outputs.page_url }}
runs-on: ubuntu-latest

```
# 👇 Force Node.js 24 (important)
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

steps:
  - name: Checkout
    uses: actions/checkout@v5   # 👈 upgrade

  - name: Setup Pages
    uses: actions/configure-pages@v6   # 👈 upgrade

  - name: Upload artifact
    uses: actions/upload-pages-artifact@v4   # 👈 upgrade

    with:
      path: '.'

  - name: Deploy to GitHub Pages
    id: deployment
    uses: actions/deploy-pages@v6   # 👈 upgrade
```
